<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Download File</title>
</head>
<body>

<h2>下载文件（下载啥啊？？？）</h2>

<!-- 下载按钮 -->
<button onclick="downloadFile('./filename.zip')">下载文件</button>

<script>
// JavaScript函数，用于处理文件下载
function downloadFile(filePath) {
    // 创建一个隐藏的可下载链接
    var downloadLink = document.createElement('a');
    downloadLink.href = filePath;
    downloadLink.download = 'filename.zip'; // 设置下载文件的名称

    // 插入到文档中，并触发点击事件
    document.body.appendChild(downloadLink);
    downloadLink.click();

    // 移除创建的链接
    document.body.removeChild(downloadLink);
}
</script>

</body>
</html>
