<!DOCTYPE html>
<html lang="zh-hans">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>红色警戒2图标生成器</title>
    <style type="text/css">
      #ViewCanvas {
        image-rendering: pixelated;
        width: 600px;
        height: 480px;
      }
    </style>
<script>
var _hmt = _hmt || [];
(function() {
  var hm = document.createElement("script");
  hm.src = "https://hm.baidu.com/hm.js?89985731c02fd5ebad9d8ba486729d29";
  var s = document.getElementsByTagName("script")[0]; 
  s.parentNode.insertBefore(hm, s);
})();
</script>
  </head>
  <body>
    <canvas id="ViewCanvas" height="48" width="60"></canvas>
    <p>测试用！</p>
    <p>
      <input
        type="checkbox"
        name="enable_full_eng_name"
        id="EnableFullEnglishName"
      /><label for="EnableFullEnglishName">Full Enghlish Unit Name</label>
    </p>
    <p>
      <textarea
        name="单位名称"
        id="UnitName"
        cols="16"
        rows="4"
        placeholder="单位名称"
      ></textarea>
    </p>
    <p>
      <input
        type="checkbox"
        name="enable_rating_sign"
        id="EnableRatingSign"
      /><label for="EnableRatingSign">显示升级图示</label>
    </p>
    <p id="EnableCameoColor_P">
      <input
        type="checkbox"
        name="enable_cameo_color"
        id="EnableCameoColor"
      /><label for="EnableCameoColor">使用原版色盘</label>
    </p>
    <p>
      <input
        type="checkbox"
        name="enable_ready_text"
        id="EnableReadyText"
      /><label for="EnableReadyText">显示就绪文字</label>
    </p>
    <p>
      <input
        type="color"
        name="ready_text_color"
        id="ReadyTextColor"
        value="#FFFF00"
      /><label for="ReadyTextColor">就绪文字颜色</label>
    </p>
    <p>
      <input
        type="file"
        name="icon_image"
        id="IconImage"
        accept="image/*"
      /><label for="IconImage"></label>
    </p>
    <p><input type="button" value="绘制图像" id="Redraw" /></p>
    <p>
      <input
        type="button"
        value="导出PNG"
        id="OutputAsPNG"
      />（注意：会直接导出当前预览图）
    </p>
    <p>
      <input
        type="button"
        value="导出SHP"
        id="OutputAsSHP"
      />（注意：会强制使用原版色盘）
    </p>
    <p>
      <input
        type="button"
        value="导出PCX（256色）"
        id="OutputAsPCX"
      />
    </p>
    <p>
      <input
        type="button"
        value="导出PCX（全彩色）"
        id="OutputAsPCX_FullColor"
      />
    </p>
  </body>
  <script src="tb.js"></script>
</html>
